<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Asmaa ❤️</title>

<style>
body {
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: Arial;
    text-align: center;
    padding: 50px;
    overflow: hidden;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
}

h1 {
    color: #e91e63;
    animation: pulse 1.5s infinite;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #e91e63;
    color: white;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}

.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-700px); opacity: 0;}
}

iframe {
    margin-top: 20px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="card">
<h1>I'm Sorry, Asmaa ❤️</h1>

<p>
Dear Asmaa,<br><br>
I know I made a mistake, and I truly regret it.<br>
You mean the world to me.<br>
Please forgive me 💔
</p>

<button onclick="playSong()">🎵 Play Our Song</button>

<!-- مشغل يوتيوب مخفي في البداية -->
<div id="youtubeContainer" style="display:none;">
    <iframe width="100%" height="200" src="" title="YouTube video" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>
</div>

<script>
function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 400);

// تشغيل الفيديو عند الضغط على الزر
function playSong() {
    const container = document.getElementById("youtubeContainer");
    const iframe = container.querySelector("iframe");
    iframe.src = "https://www.youtube.com/embed/cNGjD0VG4R8?autoplay=1";
    container.style.display = "block";
}
</script>

</body>
</html>
